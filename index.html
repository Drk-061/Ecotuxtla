<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EcoTuxtla</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

/* NAV */
nav{
background:#1a3d1f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* BOTONES */
button{
background:#2ecc71;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:6px;
}

/* LOGIN */
#loginBox{
display:none;
background:white;
padding:20px;
position:fixed;
top:20%;
left:50%;
transform:translateX(-50%);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* QUIZ */
.quiz{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

/* RANKING */
.ranking{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

.ranking-item{
display:flex;
justify-content:space-between;
padding:10px;
margin:5px;
background:#eee;
border-radius:8px;
}

.top1{background:gold;}
.top2{background:silver;}
.top3{background:#cd7f32;color:white;}
</style>

</head>
<body>

<nav>
<span>🌿 EcoTuxtla</span>
<div>
<button onclick="mostrarLogin()">Login</button>
<button onclick="mostrarRegistro()">Registro</button>
</div>
</nav>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Entrar</button>
<button onclick="cerrar()">Cerrar</button>
</div>

<!-- REGISTRO -->
<div id="registroBox" style="display:none;" class="loginBox">
<h3>Registro</h3>
<input id="nombreR" placeholder="Nombre"><br><br>
<input id="emailR" placeholder="Email"><br><br>
<input id="passR" type="password" placeholder="Password"><br><br>
<button onclick="register()">Registrar</button>
<button onclick="cerrar()">Cerrar</button>
</div>

<!-- QUIZ -->
<div class="quiz">
<h2>Quiz</h2>
<p id="pregunta"></p>
<div id="respuestas"></div>
<button onclick="siguiente()">Siguiente</button>
<p id="score"></p>
</div>

<!-- RANKING -->
<div class="ranking">
<h2>🏆 Ranking</h2>
<div id="rankingList"></div>
</div>

<script>
const API = "https://ecotuxtla.vercel.app/api"; // CAMBIAR

// ================= LOGIN =================
function mostrarLogin(){
document.getElementById("loginBox").style.display="block";
}

function mostrarRegistro(){
document.getElementById("registroBox").style.display="block";
}

function cerrar(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registroBox").style.display="none";
}

function login(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
})
.then(r=>r.json())
.then(d=>{
localStorage.setItem("userId",d.userId);
alert("Bienvenido");
});
}

function register(){
fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nombre:nombreR.value,
email:emailR.value,
password:passR.value
})
})
.then(r=>r.json())
.then(d=>alert(d.message));
}

// ================= QUIZ =================
const quiz=[
{q:"¿Dónde va el plástico?",a:["Orgánico","Plástico","Vidrio"],c:1},
{q:"¿Qué es orgánico?",a:["Botella","Cáscara","Lata"],c:1}
];

let i=0,score=0;

function cargar(){
pregunta.innerText=quiz[i].q;
respuestas.innerHTML="";

quiz[i].a.forEach((t,idx)=>{
let b=document.createElement("button");
b.innerText=t;
b.onclick=()=>{
if(idx===quiz[i].c)score++;
};
respuestas.appendChild(b);
});
}

function siguiente(){
i++;
if(i<quiz.length)cargar();
else{
let puntos=score*10;

fetch(API+"/guardar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
usuario_id:localStorage.getItem("userId"),
puntos:puntos
})
});

alert("Puntos: "+puntos);
cargarRanking();
}
}

// ================= RANKING =================
function cargarRanking(){
fetch(API+"/ranking")
.then(r=>r.json())
.then(data=>{
rankingList.innerHTML="";
data.forEach((u,index)=>{
let div=document.createElement("div");
div.className="ranking-item";

if(index==0)div.classList.add("top1");
if(index==1)div.classList.add("top2");
if(index==2)div.classList.add("top3");

div.innerHTML=`
<span>#${index+1}</span>
<span>${u.nombre}</span>
<span>${u.puntos}</span>
`;

rankingList.appendChild(div);
});
});
}

// INIT
cargar();
cargarRanking();
</script>

</body>
</html>
